<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agency - Karosh Group</title>
<link rel="stylesheet" href="../styles.css" />
<style>
.gallery {
  padding:120px 16px 60px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}
.gallery img {
  width:100%;
  height:300px;
  object-fit:cover;
  border-radius:16px;
  cursor:pointer;
  transition:.3s ease;
  display:block;
}
.gallery img:hover {
  transform:scale(1.03);
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.page-title {
  text-align:center;
  padding:110px 16px 0;
  font-size:28px;
  font-weight:800;
  letter-spacing:.04em;
}
.more-soon {
  text-align:center;
  padding:40px 16px 60px;
  color:rgba(255,255,255,.4);
  font-size:14px;
}
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap nav">
    <div class="brand">
      <span class="dot"></span>
      <span class="brand-text">KAROSH <span class="muted">GROUP</span></span>
    </div>
    <a class="pill" href="../ku/">Back</a>
  </div>
</header>

<h2 class="page-title">Agency Photos</h2>

<div class="gallery">
  <img src="../images/uploads/agency.png" alt="Agency photo">
</div>

<p class="more-soon">More photos coming soon</p>

</body>
</html>

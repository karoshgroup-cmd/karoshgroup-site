<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Family Photos - Karosh Group</title>
<link rel="stylesheet" href="../styles.css" />
<style>
.gallery{padding:120px 16px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.gallery img{width:100%;height:300px;object-fit:cover;border-radius:16px;cursor:pointer;transition:transform .4s ease, box-shadow .4s ease, opacity .4s ease;display:block;}
.gallery img:hover{transform:scale(1.04);box-shadow:0 20px 60px rgba(0,0,0,.7);opacity:.92;}
.page-title{text-align:center;padding:110px 16px 0;font-size:28px;font-weight:800;letter-spacing:.04em;}
.more-soon{text-align:center;padding:40px 16px 60px;color:rgba(255,255,255,.4);font-size:14px;}

/* Lightbox */
.lb-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0);
  z-index:9999;
  display:flex;align-items:center;justify-content:center;
  cursor:zoom-out;
  pointer-events:none;
  transition:background .5s ease;
}
.lb-overlay.active{
  background:rgba(0,0,0,.95);
  pointer-events:all;
}
.lb-overlay img{
  max-width:92vw;max-height:90vh;
  object-fit:contain;
  border-radius:6px;
  opacity:0;
  transform:scale(.88);
  transition:opacity .45s ease, transform .45s cubic-bezier(.16,1,.3,1);
  box-shadow:0 30px 100px rgba(0,0,0,.8);
  pointer-events:none;
}
.lb-overlay.active img{
  opacity:1;
  transform:scale(1);
}
.lb-close{
  position:fixed;top:22px;right:30px;
  font-size:32px;color:#fff;
  cursor:pointer;
  opacity:0;
  transition:opacity .4s ease .2s, transform .3s ease;
  line-height:1;
  pointer-events:none;
}
.lb-overlay.active .lb-close{opacity:.7;pointer-events:all;}
.lb-close:hover{opacity:1;transform:rotate(90deg);}
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap nav">
    <a class="brand" href="/" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:8px;"><span class="dot"></span><span class="brand-text">KAROSH <span class="muted">GROUP</span></span></a>
    <a class="pill" href="javascript:history.back()">Back</a>
  </div>
</header>

<h2 class="page-title">Family Photos</h2>

<div class="gallery">
  <img src="../images/uploads/Family.jpg" alt="Family photo">
</div>

<p class="more-soon">More photos coming soon</p>

<div class="lb-overlay" id="lb">
  <span class="lb-close" id="lb-close">&#x2715;</span>
  <img id="lb-img" src="" alt="">
</div>

<script>
const lb = document.getElementById('lb');
const lbImg = document.getElementById('lb-img');
const lbClose = document.getElementById('lb-close');

function openLb(src) {
  lbImg.src = src;
  requestAnimationFrame(() => {
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
  });
}
function closeLb() {
  lb.classList.remove('active');
  document.body.style.overflow = '';
}

document.querySelectorAll('.gallery img').forEach(img => {
  img.addEventListener('click', () => openLb(img.src));
});
lb.addEventListener('click', e => { if (e.target === lb || e.target === lbClose) closeLb(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
</script>

</body>
</html>
